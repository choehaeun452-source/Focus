<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>멘탈 대역폭 트래커</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 32px;
  }

  /* 블랙아웃 오버레이 */
  #blackout {
    display: none;
    position: fixed;
    inset: 0;
    background: #000000;
    z-index: 100;
  }
  #blackout.active { display: block; }

  /* 원형 타임라인 */
  #clock-wrap {
    position: relative;
    width: 300px;
    height: 300px;
  }

  #clock-svg {
    width: 100%;
    height: 100%;
  }

  /* 버튼: 원 가운데 작은 초록 원 */
  #btn-focus {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #1a5c3a;
    border: none;
    cursor: pointer;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: background 0.2s, transform 0.15s;
  }
  #btn-focus:hover {
    background: #22784c;
    transform: translate(-50%, -50%) scale(1.15);
  }
  #btn-focus:active {
    transform: translate(-50%, -50%) scale(0.95);
  }
</style>
</head>
<body>

<div id="blackout"></div>

<div id="clock-wrap">
  <svg id="clock-svg" viewBox="0 0 300 300">
    <circle fill="none" stroke="#e8e8e8" stroke-width="1" cx="150" cy="150" r="120"/>
    <circle fill="none" stroke="#f0f0f0" stroke-width="1" stroke-dasharray="2 5" cx="150" cy="150" r="86"/>
    <g id="ticks"></g>
    <g id="labels"></g>
    <g id="dots"></g>
  </svg>
  <button id="btn-focus"></button>
</div>

<script>
const CX = 150, CY = 150, R_OUTER = 120, R_INNER = 86;
const DURATION_MS = 10 * 60 * 1000;
const WEEK_MS = 7 * 24 * 60 * 60 * 1000;
const STORAGE_KEY = 'focus_logs_v1';

function loadLogs() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    return JSON.parse(raw).filter(t => t > Date.now() - WEEK_MS);
  } catch { return []; }
}

function saveLogs(logs) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
}

function timeToAngle(ts) {
  const d = new Date(ts);
  const hours = d.getHours() + d.getMinutes() / 60;
  return (hours / 24) * 360 - 90;
}

function polarToXY(angleDeg, r) {
  const rad = angleDeg * Math.PI / 180;
  return { x: CX + r * Math.cos(rad), y: CY + r * Math.sin(rad) };
}

function renderClock() {
  const ticksG = document.getElementById('ticks');
  const labelsG = document.getElementById('labels');

  for (let h = 0; h < 24; h++) {
    const angle = (h / 24) * 360 - 90;
    const isMain = h % 6 === 0;
    const p1 = polarToXY(angle, R_OUTER);
    const p2 = polarToXY(angle, R_OUTER + (isMain ? 9 : 5));

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', p1.x); line.setAttribute('y1', p1.y);
    line.setAttribute('x2', p2.x); line.setAttribute('y2', p2.y);
    line.setAttribute('stroke', isMain ? '#ccc' : '#e0e0e0');
    line.setAttribute('stroke-width', '1');
    ticksG.appendChild(line);

    if (isMain) {
      const lp = polarToXY(angle, R_OUTER + 20);
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', lp.x); text.setAttribute('y', lp.y);
      text.setAttribute('fill', '#bbb');
      text.setAttribute('font-size', '9');
      text.setAttribute('font-family', 'Courier New, monospace');
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'central');
      text.textContent = h === 0 ? '0h' : `${h}h`;
      labelsG.appendChild(text);
    }
  }
}

function renderDots(logs) {
  const dotsG = document.getElementById('dots');
  dotsG.innerHTML = '';
  const now = Date.now();

  logs.forEach(ts => {
    const angle = timeToAngle(ts);
    const ageFraction = (now - ts) / WEEK_MS;
    const r = R_INNER + (R_OUTER - R_INNER) * (1 - ageFraction);
    const pos = polarToXY(angle, r);
    const opacity = 0.25 + 0.75 * (1 - ageFraction);
    const radius = 3 + 2.5 * (1 - ageFraction);

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', pos.x);
    circle.setAttribute('cy', pos.y);
    circle.setAttribute('r', radius);
    circle.setAttribute('fill', '#1a5c3a');
    circle.setAttribute('opacity', opacity);

    const d = new Date(ts);
    const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
    title.textContent = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    circle.appendChild(title);
    dotsG.appendChild(circle);
  });
}

let blackoutTimer = null;

function startBlackout() {
  const overlay = document.getElementById('blackout');
  overlay.classList.add('active');
  clearTimeout(blackoutTimer);
  blackoutTimer = setTimeout(() => {
    overlay.classList.remove('active');
  }, DURATION_MS);
}

document.getElementById('btn-focus').addEventListener('click', () => {
  const logs = loadLogs();
  logs.push(Date.now());
  saveLogs(logs);
  renderDots(logs);
  startBlackout();
});

renderClock();
renderDots(loadLogs());
</script>
</body>
</html>
